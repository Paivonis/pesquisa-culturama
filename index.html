<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="assets/culturama-favico.png" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Pesquisa Culturama</title>
  </head>

  <body>
    <main>
      <header>
        <img src="assets/logo-culturama.png" alt="Logo Culturama" />
        <h1>Pesquisa de Opinião</h1>
      </header>

      <section>
        <form action="sucesso.html" method="get">
          <fieldset>
            <legend>Informações Pessoais</legend>

            <label for="username">Nome do Usuário:</label>
            <input type="text" id="username" name="username" required />
            <br /><br />

            <label for="age">Idade:</label>
            <input
              type="number"
              id="age"
              name="age"
              min="12"
              max="100"
              required
            />
            <br /><br />

            <label for="birthDate">Data de Nascimento:</label>
            <input type="date" id="birthDate" name="birthDate" required />
            <br /><br />

            <label for="userEmail">Email:</label>
            <input type="email" id="userEmail" name="userEmail" required />
            <br /><br />

            <label for="userNumber">Número de Telefone:</label>
            <input
              type="tel"
              id="userNumber"
              name="userNumber"
              pattern="[0-9]{11}"
              placeholder="Ex: 11987654321"
            />
            <br /><br />

            <label for="userImage">Upload de Imagem:</label>
            <input
              type="file"
              id="userImage"
              name="userImage"
              accept="image/*"
            />
          </fieldset>

          <fieldset>
            <legend>Perfil</legend>

            <p>Gênero:</p>

            <input
              type="radio"
              id="masculino"
              name="userGender"
              value="masculino"
            />
            <label for="masculino">Masculino</label>

            <input
              type="radio"
              id="feminino"
              name="userGender"
              value="feminino"
            />
            <label for="feminino">Feminino</label>

            <input
              type="radio"
              id="naoInformado"
              name="userGender"
              value="Not informed"
            />
            <label for="naoInformado">Prefiro não informar</label>

            <br /><br />

            <label for="maritalStatus">Estado Civil:</label>

            <select name="maritalStatus" id="maritalStatus">
              <option value="">Selecione</option>
              <option value="Casado">Casado</option>
              <option value="Solteiro">Solteiro</option>
              <option value="Divorciado">Divorciado</option>
              <option value="Viúvo">Viúvo</option>
              <option value="União Estável">União Estável</option>
            </select>

            <br /><br />

            <label for="states">Estado:</label>

            <select name="states" id="states">
              <option value="">Selecione</option>
              <option value="São Paulo">São Paulo</option>
              <option value="Rio de Janeiro">Rio de Janeiro</option>
              <option value="Minas Gerais">Minas Gerais</option>
              <option value="Bahia">Bahia</option>
            </select>

            <br /><br />

            <label for="cidade">Cidade:</label>

            <input
              type="text"
              id="cidade"
              name="cidade"
              placeholder="Digite sua cidade"
            />
          </fieldset>

          <fieldset>
            <legend>Hábitos</legend>

            <p>Redes Sociais:</p>

            <input
              type="checkbox"
              id="instagram"
              name="social[]"
              value="Instagram"
            />
            <label for="instagram">Instagram</label>
            <br />

            <input
              type="checkbox"
              id="facebook"
              name="social[]"
              value="Facebook"
            />
            <label for="facebook">Facebook</label>
            <br />

            <input
              type="checkbox"
              id="twitter"
              name="social[]"
              value="Twitter"
            />
            <label for="twitter">Twitter</label>
            <br />

            <input
              type="checkbox"
              id="linkedin"
              name="social[]"
              value="LinkedIn"
            />
            <label for="linkedin">LinkedIn</label>
            <br />

            <input type="checkbox" id="tiktok" name="social[]" value="TikTok" />
            <label for="tiktok">TikTok</label>

            <br /><br />

            <label for="musicStyle">Estilo Musical:</label>

            <datalist id="musicStyles">
              <option value="Pop"></option>
              <option value="Rock"></option>
              <option value="Jazz"></option>
              <option value="Eletrônica"></option>
              <option value="Samba"></option>
              <option value="Reggae"></option>
            </datalist>

            <input
              type="text"
              id="musicStyle"
              name="musicStyle"
              list="musicStyles"
              placeholder="Digite seu estilo musical favorito"
            />

            <br /><br />

            <label for="color">Cor Favorita:</label>
            <input type="color" id="color" name="userfavoriteColor" />
          </fieldset>

          <fieldset>
            <legend>Opinião</legend>

            <p>Satisfação:</p>

            <input type="radio" id="otima" name="satisfaction" value="Ótima" />
            <label for="otima">Ótima</label>
            <br />

            <input type="radio" id="boa" name="satisfaction" value="Boa" />
            <label for="boa">Boa</label>
            <br />
            <input type="radio" id="regular" name="satisfaction" value="Regular" />
            <label for="regular">Regular</label>
            <br />
            <input type="radio" id="insatisfeito" name="satisfaction" value="Insatisfeito" />
            <label for="insatisfeito">Insatisfeito</label>
            <br>
            <label for="comentario">Comentário:</label>
            <br />

            <textarea
              id="comentario"
              name="comentario"
              placeholder="Digite seu comentário"
            ></textarea>
          </fieldset>

          <fieldset>
            <legend>Confirmações</legend>

            <input type="checkbox" id="terms" name="terms" required />
            <label for="terms">Aceito participar da pesquisa</label>
            <br />
            <input type="checkbox" id="newsletter" name="newsletter" />
            <label for="newsletter">Quero receber novidades por e-mail</label>
          </fieldset>

          <button type="submit">Pesquisar</button>
          <button type="reset">Limpar</button>
        </form>
      </section>
    </main>
  </body>
</html>

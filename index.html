<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
        <section>
            <form action="" method="get">
                <fieldset>
                    <legend>Informações Pessoais</legend>
                    <label for="username">Nome do Usuário:</label>
                    <input  id="username" name="username" required><br>
                    <label for="age">Idade:</label>
                    <input  id="age" name="age" min="12" max="100" required>
                    <br>
                <label for="birthDate">Data de Nascimento:</label>
                <input  id="birthDate" type="date" name="birthDate"><br>
                   
                <label for="userEmail">Email:</label>
                <input id="userEmail" type="email" name="userEmail" required> <br>
                
                <label for="userNumber">Número de Telefone:</label>
                <input id="userNumber" type="tel" name="userNumber" pattern="[0-9]{11}" placeholder="Ex: 11987654321">
                <br>
                 <label for="userImage">Upload de Imagem:</label>
                <input id="userImage" type="file" accept="image/*" name="userImage"> 
              

        <fieldset>
        <legend>Perfil</legend>

        <p>Gênero:</p>

        <input id="masculino" type="radio" name="userGender"
         value="masculino">
        <label for="masculino">Masculino</label>

        <input id="feminino" type="radio" name="userGender"
         value="feminino">
        <label for="feminino">Feminino</label>

        <input id="naoInformado" type="radio" name="userGender"
         value="Not informed">
        <label for="naoInformado">Prefiro não informar</label>
        <br>
          
            <label for="Marital Status">Estado Civil:</label>
    <select name="Marital Status" id="Marital Status">
        <option value="NotInformed">Selecione</option>       
        <option value="Casado">Casado</option>
        <option value="Solteiro">Solteiro</option>
        <option value="Divorciado">Divorciado</option>
        <option value="Viúvo">Viúvo</option>
        <option value="União Estável">União Estável</option>
    </select>
    
        <label for="States">Estado:</label>
<select name="States" id="States">
    <option value="">Selecione</option>
    <option value="Acre">Acre</option>
    <option value="Amapá">Amapá</option>
    <option value="Amazonas">Amazonas</option>
    <option value="Bahia">Bahia</option>
    <option value="Ceará">Ceará</option>
    <option value="Distrito Federal">Distrito Federal</option>
    <option value="Espírito Santo">Espírito Santo</option>
    <option value="Goiás">Goiás</option>
    <option value="Maranhão">Maranhão</option>
    <option value="Mato Grosso do Sul">Mato Grosso do Sul</option>
    <option value="Mato Grosso">Mato Grosso</option>
    <option value="Minas Gerais">Minas Gerais</option>
    <option value="Pará">Pará</option>
    <option value="Paraíba">Paraíba</option>
    <option value="Paraná">Paraná</option>
    <option value="Pernambuco">Pernambuco</option>
    <option value="Piauí">Piauí</option>
    <option value="Rio de Janeiro">Rio de Janeiro</option>
    <option value="Rio Grande do Norte">Rio Grande do Norte</option>
    <option value="Rio Grande do Sul">Rio Grande do Sul</option>
    <option value="Rondônia">Rondônia</option>
    <option value="Roraima">Roraima</option>
    <option value="Santa Catarina">Santa Catarina</option>
    <option value="São Paulo">São Paulo</option>
    <option value="Sergipe">Sergipe</option>
    <option value="Tocantins">Tocantins</option>
</select>

<br><br>

<label for="cidade">Cidade:</label>
<input type="text" id="cidade" name="cidade" placeholder="Digite sua cidade">
</select>

<br><br>


</select>


         </fieldset> 
        
    
    <fieldset>
    <legend>Hábitos</legend>

    <p>Redes Sociais:</p>       

    <input type="checkbox" id="instagram" name="social[]" value="Instagram">
    <label for="instagram">Instagram</label>
    <br>

    <input type="checkbox" id="facebook" name="social[]" value="Facebook">
    <label for="facebook">Facebook</label>
    <br>

    <input type="checkbox" id="twitter" name="social[]" value="Twitter">
    <label for="twitter">Twitter</label>
    <br>

    <input type="checkbox" id="linkedin" name="social[]" value="LinkedIn">
    <label for="linkedin">LinkedIn</label>
    <br>

    <input type="checkbox" id="tiktok" name="social[]" value="TikTok">
    <label for="tiktok">TikTok</label>

</fieldset>

<button type="submit">Pesquisar</button>
</form>   
</header>
